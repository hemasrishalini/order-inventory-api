version: "3.9"

services:
  api:
    build: .
    container_name: order_api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    container_name: stock_worker
    command: python workers/stock_worker.py
    depends_on:
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
